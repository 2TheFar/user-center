# Spring 项目的配置文件
spring:
  application:
    name: user-center

  # DataSource Config
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: "1234"
    url: jdbc:mysql://localhost:3306/user_center?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8

server:
  # 默认是 8080，也就是不写就是 8080
  port: 8080

  servlet:
    session:
      # Session 超时时间：登录态有效期设置为 1 天
      timeout: 1d

mybatis-plus:
  # Mapper XML 扫描路径
  mapper-locations: classpath*:/mapper/**/*.xml

  configuration:
    # 是否开启下划线转驼峰映射
    map-underscore-to-camel-case: false

  global-config:
    db-config:
      # 全局逻辑删除字段名，填写实体类中的属性名
      logic-delete-field: isDeleted

      # 逻辑已删除值，可选，默认值为 1
      logic-delete-value: 1

      # 逻辑未删除值，可选，默认值为 0
      logic-not-delete-value: 0